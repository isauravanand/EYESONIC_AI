<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EYESONIC AI | Assistive Vision</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="main-container">
        <header>
            <h1>EYESONIC <span class="ai-text">AI</span> 👁️</h1>
            <div id="status-chip" class="status-offline">SYSTEM OFFLINE</div>
        </header>

        <div class="dashboard-grid">
            <aside class="sidebar">
                <div class="glass-card">
                    <h3>ENVIRONMENT</h3>
                    <div class="mode-grid">
                        <button id="home" class="mode active" onclick="setMode('home')">Home</button>
                        <button id="outdoor" class="mode" onclick="setMode('outdoor')">Outdoor</button>
                        <button id="crowded" class="mode" onclick="setMode('crowded')">Crowded</button>
                        <button id="travel" class="mode" onclick="setMode('travel')">Travel</button>
                    </div>
                </div>

                <div class="glass-card">
                    <h3>AI CONFIG</h3>
                    <div class="select-wrapper">
                        <select id="modelSelect" onchange="setModel(this.value)">
                            <option value="yolov8n">YOLOv8 Nano (Fastest)</option>
                            <option value="yolov8s">YOLOv8 Small (Balanced)</option>
                            <option value="yolov8m">YOLOv8 Medium (Accurate)</option>
                        </select>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="btn-start" onclick="start()">START SYSTEM</button>
                    <button class="btn-stop" onclick="stop()">STOP SYSTEM</button>
                    <button class="btn-train" onclick="trainFace()" style="background: linear-gradient(135deg, #8a2be2, #4b0082); margin-top: 10px;">TRAIN NEW FACE</button>
                </div>
            </aside>

            <main class="viewport-section">
                <div class="video-container">
                    <div class="scanline"></div>
                    <video id="video" autoplay playsinline></video>
                    <canvas id="overlay"></canvas>
                    <div class="corners">
                        <span></span><span></span><span></span><span></span>
                    </div>
                </div>

                <div id="log-container" class="glass-card">
                    <div class="log-header">LIVE TELEMETRY</div>
                    <div id="log">
                        <div class="log-entry sys">[SYSTEM LOG INITIALIZED]</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        // Update the status chip visually when buttons are clicked
        function updateStatus(text, isOnline) {
            const chip = document.getElementById('status-chip');
            chip.innerText = text;
            chip.className = isOnline ? 'status-online' : 'status-offline';
        }
        // Patching your existing start/stop to update UI
        const originalStart = window.start;
        window.start = () => { if (originalStart) originalStart(); updateStatus('SYSTEM ACTIVE', true); };
        const originalStop = window.stop;
        window.stop = () => { if (originalStop) originalStop(); updateStatus('SYSTEM PAUSED', false); };
    </script>
</body>

</html>
